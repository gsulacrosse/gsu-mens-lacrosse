<?xml version="1.0" encoding="UTF-8"?>
<!--
  PLACEHOLDER CREST — NOT THE REAL LOGO.

  The club's actual crest is a circular navy/white badge with an eagle-head
  silhouette holding a lacrosse stick, with "GEORGIA SOUTHERN LACROSSE" set
  around the ring. That artwork is NOT reproduced here on purpose: drawing an
  approximation from a description would produce a fake logo that someone
  might mistake for the real one and ship.

  This is a neutral stand-in. Replace this file with the team's real vector
  crest (same filename, public/brand/crest.svg) and nothing else needs to
  change. See ASSETS-NEEDED.md.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="crestTitle">
  <title id="crestTitle">Georgia Southern Men's Lacrosse — placeholder crest</title>

  <defs>
    <path id="ringTop" d="M 100,100 m -74,0 a 74,74 0 0 1 148,0" fill="none"/>
    <path id="ringBottom" d="M 100,100 m -66,0 a 66,66 0 0 0 132,0" fill="none"/>
  </defs>

  <circle cx="100" cy="100" r="96" fill="#0a1f44"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#b5a16b" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>

  <!-- Wordmark around the ring -->
  <text font-family="Arial Narrow, Arial, sans-serif" font-size="15.5" font-weight="bold"
        fill="#ffffff" letter-spacing="2.6">
    <textPath href="#ringTop" startOffset="50%" text-anchor="middle">GEORGIA SOUTHERN</textPath>
  </text>
  <text font-family="Arial Narrow, Arial, sans-serif" font-size="15.5" font-weight="bold"
        fill="#ffffff" letter-spacing="3.4">
    <textPath href="#ringBottom" startOffset="50%" text-anchor="middle">LACROSSE</textPath>
  </text>

  <!-- Crossed sticks, plainly geometric — a stand-in mark, not their crest -->
  <g stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" fill="none">
    <line x1="76" y1="128" x2="112" y2="74"/>
    <line x1="124" y1="128" x2="88" y2="74"/>
  </g>
  <g stroke="#b5a16b" stroke-width="4" fill="none">
    <ellipse cx="115" cy="68" rx="9" ry="12" transform="rotate(34 115 68)"/>
    <ellipse cx="85"  cy="68" rx="9" ry="12" transform="rotate(-34 85 68)"/>
  </g>

  <line x1="66" y1="140" x2="134" y2="140" stroke="#b5a16b" stroke-width="1.2"/>
  <text x="100" y="156" text-anchor="middle"
        font-family="Arial Narrow, Arial, sans-serif" font-size="13"
        font-weight="bold" fill="#b5a16b" letter-spacing="2.2">EST. 1993</text>
</svg>
